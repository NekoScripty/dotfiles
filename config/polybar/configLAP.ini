;==========================================================
;
;   POLYBAR CONFIGURATION
;   Theme: Professional Formal Black / Light Grey
;
;==========================================================

[colors]
; Deep Obsidian Black for the bar background
background = #0F0F11
; Charcoal Grey for highlighted or alternate backgrounds
background-alt = #24262E
; Soft White/Light Grey for primary text
foreground = #D1D4D9
; Medium Grey for secondary text and icons
foreground-alt = #8A8E99
; Crisp Light Grey for primary accents and icons
primary = #B0B3B8
; Subdued Grey for secondary accents
secondary = #6C7078
; Muted Red/Grey for alerts
alert = #B0B3B8
; Darker grey for empty or inactive states
overlay0 = #4A4D54

[bar/example]
width = 100%
height = 35
offset-x = 0%
offset-y = 0%
radius = 0.0
fixed-center = true
bottom = true

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 0
line-color = #00000000

border-size = 0
border-color = #00000000

padding-left = 1
padding-right = 1

module-margin-left = 1
module-margin-right = 1

font-0 = Iosevka Custom:pixelsize=9;1
font-1 = Iosevka Custom:fontformat=truetype:size=9
font-2 = siji:pixelsize=10;1
font-3 = unifont:fontformat=truetype:size=8:antialias=false;0
font-4 = "Font Awesome 7 Free:style=Regular:pixelsize=10;1"
font-5 = "Font Awesome 7 Free:style=Solid:pixelsize=10;1"
font-6 = "Font Awesome 7 Free:pixelsize=10;1"
font-7 = "SourceHanSansJP-Normal:pixelsize=5;1"

modules-left = rofi thunar-icon browser screen bspwm systray
modules-center = date
modules-right = pulseaudio eth memory filesystem cpu battery powermenu

tray-position = none
tray-padding = 2

cursor-click = pointer
cursor-scroll = ns-resize

[module/filesystem]
type = internal/fs
interval = 25
mount-0 = /
; Inline color updated to match primary light grey
label-mounted = %{F#B0B3B8}%{F-} %percentage_used%%
label-unmounted = %mountpoint% not mounted
label-unmounted-foreground = ${colors.overlay0}

[module/bspwm]
type = internal/bspwm
label-focused = %name%
label-focused-background = ${colors.background-alt}
label-focused-foreground = ${colors.primary}
label-focused-padding = 1
label-occupied = %name%
label-occupied-padding = 1
label-urgent = %name%!
label-urgent-background = ${colors.alert}
label-urgent-padding = 1
label-empty = %name%
label-empty-foreground = ${colors.overlay0}
label-empty-padding = 1

[module/screen]
type = custom/text
; Using Font Awesome icon for a professional look
content = ""
content-foreground = ${colors.primary}
content-background = ${colors.background}
content-padding = 1
click-left = xterm -e bash .config/bspwm/screen.sh

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = " "
format-prefix-foreground = ${colors.primary}
label = %percentage:2%%

[module/memory]
type = internal/memory
interval = 2
format-prefix = " "
format-prefix-foreground = ${colors.primary}
label = %percentage_used%%

[module/eth]
type = custom/script
exec = ip -4 route get 1.1.1.1 2>/dev/null | awk '{print $7}'
interval = 3.0
format-prefix = " "
format-prefix-foreground = ${colors.primary}
label = %output%
label-foreground = ${colors.foreground}
click-left = ip -4 route get 1.1.1.1 | awk '{print $7}' | xclip -sel clip

[module/date]
type = internal/date
interval = 5
date =
date-alt = " %a, %b %e %Y"
time = %H:%M
time-alt =
format-prefix = " "
format-prefix-foreground = ${colors.primary}
label = %date% %time%

[module/pulseaudio]
type = internal/pulseaudio
format-volume = <label-volume> <bar-volume>
label-volume =  %percentage%%
label-volume-foreground = ${colors.foreground}
label-muted =  muted
label-muted-foreground = ${colors.overlay0}
bar-volume-width = 10
bar-volume-foreground-0 = ${colors.primary}
bar-volume-foreground-1 = ${colors.primary}
bar-volume-foreground-2 = ${colors.primary}
bar-volume-foreground-3 = ${colors.primary}
bar-volume-foreground-4 = ${colors.primary}
bar-volume-foreground-5 = ${colors.secondary}
bar-volume-foreground-6 = ${colors.secondary}
bar-volume-gradient = false
bar-volume-indicator = 
bar-volume-indicator-font = 2
bar-volume-fill = ═
bar-volume-fill-font = 2
bar-volume-empty = ═
bar-volume-empty-font = 2
bar-volume-empty-foreground = ${colors.background-alt}

[module/battery]
type = internal/battery
battery = BAT0
adapter = AC
full-at = 98

format-charging = <animation-charging> <label-charging>
format-discharging = <ramp-capacity> <label-discharging>

format-full-prefix = " "
format-full-prefix-foreground = ${colors.primary}

label-charging = %percentage%%
label-discharging = %percentage%%

ramp-capacity-0 = 
ramp-capacity-1 = 
ramp-capacity-2 = 
ramp-capacity-3 = 
ramp-capacity-4 = 
ramp-capacity-foreground = ${colors.primary}

animation-charging-0 = 
animation-charging-1 = 
animation-charging-2 = 
animation-charging-3 = 
animation-charging-4 = 
animation-charging-foreground = ${colors.primary}
animation-charging-framerate = 750
#####################################/\

[module/powermenu]
type = custom/text
content = 
content-foreground = ${colors.alert}
content-padding = 1
click-left = bash .config/bspwm/log.sh

[module/rofi]
type = custom/text
content =  Nya!
content-foreground = ${colors.primary}
click-left = rofi -show drun

[module/thunar-icon]
type = custom/text
content =  
content-foreground = ${colors.primary}
click-left = dolphin $HOME

[module/browser]
type = custom/text
content =  
content-foreground = ${colors.primary}
click-left = chromium

[module/systray]
type = internal/tray
format-margin = 8pt
tray-spacing = 16pt
tray-size = 16pt
tray-background = ${colors.background}

[settings]
screenchange-reload = true

[global/wm]
margin-top = 0
margin-bottom = 0
