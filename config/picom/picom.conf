#################################
#   Hyprland-Style Animations   #
#################################

animations = (
  {
    triggers = ["open", "show"];
    preset = "appear";
    duration = 0.2;
    scale = 0.8;
  },
  {
    triggers = ["close", "hide"];
    preset = "disappear";
    duration = 0.15;
    scale = 0.8;
  },
  {
    triggers = ["geometry"];
    preset = "geometry-change";
    duration = 0.25;
  },
  # Workspace Switching (Slide left/right)
  {
    triggers = ["workspace-out"];
    preset = "slide-out";
    direction = "left";
    duration = 0.25;
  },
  {
    triggers = ["workspace-in-inverse"];
    preset = "slide-in";
    direction = "right";
    duration = 0.25;
  }
)

animation-stiffness = 300.0;
animation-dampening = 22.0;
animation-clamping = false;
animation-mass = 1.0;
animation-exclude = [
  "class_g = 'slop'"
];

#################################
#       Backend & General      #
#################################
backend = "glx";
vsync = true;
use-damage = false;
glx-swap-method = "buffer-age";

detect-rounded-corners = true;
detect-client-opacity = true;
detect-transient = true;
detect-client-leader = true;
mark-wmwin-focused = true;
mark-ovlp-focused = true;
focus-exclude = [ "class_g = 'Polybar'" ];
log-level = "warn";

#################################
#    Corners & Geometry        #
#################################
corner-radius = 12;             # Hyprland typically uses slightly tighter corners (10-12)
rounded-corners-exclude = [
  "window_type = 'dock'",
  "window_type = 'desktop'"
];

#################################
#   Transparency & Opacity     #
#################################
opacity-rule = [
  "90:class_g = 'Rofi'",
  "100:class_g = 'Kitty'",
  "90:class_g = 'Polybar'",
  "90:class_g = 'XTerm'"
];

#################################
#     Background Blurring      #
#################################
blur: {
  method = "dual_kawase";
  strength = 5;
  background = true;
  background-frame = false;
  background-fixed = false;
}

blur-background-exclude = [
  "window_type = 'dock'",
  "window_type = 'desktop'",
  "_GTK_FRAME_EXTENTS@:c"
];

#################################
#       Shadow Settings        #
#################################
shadow = true;
shadow-radius = 15;
shadow-opacity = 0.4;
shadow-offset-x = -15;
shadow-offset-y = -15;

shadow-exclude = [
  "class_g = 'Polybar'",
  "class_g = 'Rofi'",
  "window_type = 'dock'",
  "window_type = 'desktop'"
];

#################################
#      Window Type Rules       #
#################################
wintypes:
{
  tooltip = { fade = true; shadow = false; opacity = 0.9; };
  dock = { shadow = false; opacity = 1.0; };
  dnd = { shadow = false; };
  desktop = { shadow = false; };
  menu = { fade = true; shadow = true; };
  popup_menu = { fade = true; shadow = true; };
  dropdown_menu = { fade = true; shadow = true; };
}
